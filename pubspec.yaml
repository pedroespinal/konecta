name: konecta
description: "Konecta - Mensajeria segura y privada"
publish_to: 'none'

version: 1.2.0+16

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navegacion
  go_router: ^14.8.1

  # UI / Fuentes / Iconos
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cupertino_icons: ^1.0.8

  # Almacenamiento seguro
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3

  # Informacion de la app
  package_info_plus: ^8.3.0

  # Criptografia — Signal Protocol + firma de autoria
  cryptography: ^2.7.0
  convert: ^3.1.2

  # Internacionalizacion
  intl: ^0.20.2

  # Fase 2: Auth
  local_auth: ^2.3.0
  pinput: ^5.0.0
  country_code_picker: ^3.0.0
  image_picker: ^1.1.2
  permission_handler: ^11.4.0

  # Fase 3: Mensajeria
  sqflite: ^2.4.2              # Base de datos local SQLite
  path: ^1.9.1                 # Rutas de archivos
  web_socket_channel: ^3.0.2   # WebSocket para relay
  uuid: ^4.5.1                 # IDs unicos de mensajes
  intl_phone_number_input: ^0.7.4  # Formato internacional

  # Fase 4: Llamadas WebRTC
  flutter_webrtc: ^1.5.1           # Voz y video P2P
  record: 5.1.2                    # Grabacion de notas de voz (5.2.x rompe record_linux)
  just_audio: ^0.9.40              # Reproduccion de audio

  # Firebase — notificaciones de actualización + push
  firebase_core: ^3.6.0
  firebase_remote_config: ^5.1.0
  firebase_messaging: ^15.1.6

  # Abrir URLs (link de descarga de actualización)
  url_launcher: ^6.3.1

  # QR code
  qr_flutter: ^4.1.0

  # Escáner QR
  mobile_scanner: ^6.0.0

  # Compartir contenido (QR, invitar amigos)
  share_plus: ^10.0.0

  # Selector de emojis en el chat
  emoji_picker_flutter: ^4.4.0

  # Contactos del directorio telefónico
  flutter_contacts: ^1.1.9

dependency_overrides:
  # record_linux 0.7.2 no implementa record_platform_interface >=1.6.0
  # Forzar version compatible hasta que record_linux publique un fix
  record_platform_interface: 1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
